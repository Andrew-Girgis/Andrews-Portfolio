name: Update Projects

on:
  schedule:
    # Every Monday at 9:00 AM UTC (5:00 AM ET)
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run project updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/update-projects.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/projects.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: auto-update project list from GitHub repos"
          title: "feat: Update portfolio projects"
          body: |
            ## Automated Project Update

            This PR was generated by the weekly project discovery workflow.

            **What changed:**
            - Scanned all public GitHub repos for new projects
            - Used AI to generate descriptions and tags for new repos
            - Updated last commit dates for existing projects

            **Please review:**
            - [ ] New project titles and descriptions are accurate
            - [ ] Tags are appropriate
            - [ ] No unwanted repos were added

            > You can add images for new projects before merging.
          branch: auto/update-projects
          delete-branch: true
          labels: automated
